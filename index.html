<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WILLES</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@100;200;300&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #c0b2a5;
    --fg: #f0ede8;
    --accent: #f0ede8;
    --muted: rgba(240,237,232,0.22);
    --dim: rgba(240,237,232,0.04);
  }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: var(--bg);
    color: var(--fg);
  }

  body {
    font-family: 'Inter', -apple-system, 'Helvetica Neue', sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
  }

  /* Subtle grid background */
  .grid {
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(var(--dim) 1px, transparent 1px),
      linear-gradient(90deg, var(--dim) 1px, transparent 1px);
    background-size: 80px 80px;
    mask-image: radial-gradient(ellipse 80% 80% at 50% 50%, black 30%, transparent 100%);
    -webkit-mask-image: radial-gradient(ellipse 80% 80% at 50% 50%, black 30%, transparent 100%);
  }



  /* Main content */
  .content {
    position: relative;
    z-index: 10;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0;
    text-align: center;
    animation: rise 1.4s cubic-bezier(0.16,1,0.3,1) 0.2s both;
  }

  @keyframes rise {
    from { opacity: 0; transform: translateY(24px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* The main title */
  .name {
    font-family: 'Inter', -apple-system, 'Helvetica Neue', sans-serif;
    font-size: clamp(72px, 16vw, 210px);
    font-weight: 100;
    letter-spacing: 0.18em;
    line-height: 1;
    color: var(--fg);
    white-space: nowrap;
    position: relative;
  }

  /* Hairline rule */
  .rule {
    width: 100%;
    height: 1px;
    background: var(--muted);
    margin: clamp(1.4rem, 2.8vw, 2.4rem) 0;
    position: relative;
  }

  /* Animated scan line */
  .rule::after {
    content: '';
    position: absolute;
    top: 0; left: -100%;
    width: 40%;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--fg), transparent);
    animation: scan 4s cubic-bezier(0.4,0,0.6,1) infinite;
  }

  @keyframes scan {
    0%   { left: -40%; opacity: 0; }
    10%  { opacity: 1; }
    90%  { opacity: 1; }
    100% { left: 100%; opacity: 0; }
  }

  /* Meta row */
  .meta {
    display: flex;
    align-items: center;
    gap: clamp(1.5rem, 3vw, 3rem);
    width: 100%;
    justify-content: space-between;
  }

  .tagline {
    font-size: clamp(9px, 0.9vw, 11px);
    font-weight: 200;
    letter-spacing: 0.42em;
    text-transform: uppercase;
    color: rgba(240,237,232,0.38);
  }

  /* Blinking cursor */
  .cursor {
    display: inline-block;
    width: 1px;
    height: 0.9em;
    background: rgba(240,237,232,0.4);
    margin-left: 2px;
    vertical-align: middle;
    animation: blink 1.1s step-end infinite;
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50%       { opacity: 0; }
  }

  .contact {
    font-size: clamp(9px, 0.9vw, 11px);
    font-weight: 200;
    letter-spacing: 0.42em;
    text-transform: lowercase;
    color: rgba(240,237,232,0.38);
    text-decoration: none;
    transition: color 0.3s ease;
  }

  .contact:hover { color: var(--fg); }

  /* Status dot */
  .status {
    position: fixed;
    bottom: 32px;
    right: 40px;
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 10px;
    font-weight: 200;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: rgba(240,237,232,0.22);
    z-index: 20;
  }

  .dot {
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: rgba(240,237,232,0.35);
    animation: pulse 2.5s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 0.3; transform: scale(1); }
    50%       { opacity: 1;   transform: scale(1.3); }
  }

  /* Version label top right */
  .version {
    position: fixed;
    top: 36px;
    right: 40px;
    font-size: 10px;
    font-weight: 200;
    letter-spacing: 0.3em;
    color: rgba(240,237,232,0.18);
    z-index: 20;
  }

  /* Year bottom left */
  .year {
    position: fixed;
    bottom: 32px;
    left: 40px;
    font-size: 10px;
    font-weight: 200;
    letter-spacing: 0.3em;
    color: rgba(240,237,232,0.18);
    z-index: 20;
  }
</style>
</head>
<body>

<div class="grid"></div>


<span class="version">v 0.1</span>
<span class="year">©&nbsp;2026</span>

<!-- Status -->
<div class="status">
  <div class="dot"></div>
  shaping
</div>

<!-- Main -->
<div class="content">
  <h1 class="name">WILLES</h1>
  <div class="rule"></div>
  <div class="meta">
    <span class="tagline">willes.eu<span class="cursor"></span></span>
    <a class="contact" href="mailto:hello@willes.eu">hello@willes.eu</a>
  </div>
</div>

<script>
  const content = document.querySelector('.content');
  let tx = 0, ty = 0;

  document.addEventListener('mousemove', e => {
    const dx = (e.clientX / window.innerWidth - 0.5);
    const dy = (e.clientY / window.innerHeight - 0.5);
    tx += (dx - tx) * 0.06;
    ty += (dy - ty) * 0.06;
  });

  (function tick() {
    content.style.transform = `translate(${tx * 6}px, ${ty * 4}px)`;
    requestAnimationFrame(tick);
  })();
</script>

</body>
</html>
